<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MACYPRINTS</title>
    <!--
      SPA fallback for GitHub Pages (rafgraph/spa-github-pages technique).
      Pages serves this for unknown paths (e.g. a refresh on /macyprints/success);
      we re-encode the path into a query and bounce to index.html, which restores it.
      pathSegmentsToKeep = 1 keeps the /macyprints/ project-page prefix.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
